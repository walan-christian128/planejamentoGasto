<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento Financeiro Mensal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Controle de Gastos Mensal</h2>
        
        <div class="row">
            <!-- Formulário e Seletor -->
            <div class="col-md-4">
                <div class="card p-3 shadow-sm mb-4">
                    <label class="form-label fw-bold">Selecionar Mês/Ano</label>
                    <input type="month" id="mesSelecionado" class="form-control mb-3" onchange="atualizarInterface()">
                    
                    <input type="text" id="desc" class="form-control mb-2" placeholder="Descrição">
                    <input type="number" id="valor" class="form-control mb-2" placeholder="Valor (R$)">
                    <select id="tipo" class="form-control mb-2">
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                    <button onclick="adicionarTransacao()" class="btn btn-primary w-100">Salvar Transação</button>
                </div>
            </div>

            <!-- Resumo -->
            <div class="col-md-8">
                <div class="card p-3 shadow-sm">
                    <canvas id="meuGrafico" style="max-height: 200px;"></canvas>
                    <div class="d-flex justify-content-between mt-3">
                        <h4>Saldo do Mês: <span id="saldo" class="text-primary">R$ 0,00</span></h4>
                    </div>
                </div>
            </div>
        </div>

        <table class="table mt-4 bg-white shadow-sm">
            <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Ação</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        // Inicialização
        let database = JSON.parse(localStorage.getItem('financasPeriodos')) || {};
        const mesInput = document.getElementById('mesSelecionado');
        
        // Define o mês atual como padrão
        const hoje = new Date();
        mesInput.value = hoje.toISOString().slice(0, 7);

        let chart = new Chart(document.getElementById('meuGrafico').getContext('2d'), {
            type: 'doughnut',
            data: { labels: ['Receitas', 'Despesas'], datasets: [{ data: [0, 0], backgroundColor: ['#28a745', '#dc3545'] }] }
        });

        function atualizarInterface() {
            const periodo = mesInput.value;
            const transacoes = database[periodo] || [];
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            
            let totalRec = 0, totalDesp = 0;

            transacoes.forEach((t, i) => {
                if(t.tipo === 'receita') totalRec += parseFloat(t.valor);
                else totalDesp += parseFloat(t.valor);
                
                lista.innerHTML += `<tr><td>${t.desc}</td><td>${t.tipo}</td><td>R$ ${t.valor}</td><td><button class="btn btn-danger btn-sm" onclick="remover(${i})">X</button></td></tr>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(totalRec - totalDesp).toFixed(2)}`;
            chart.data.datasets[0].data = [totalRec, totalDesp];
            chart.update();
        }

        function adicionarTransacao() {
            const periodo = mesInput.value;
            const desc = document.getElementById('desc').value;
            const valor = document.getElementById('valor').value;
            const tipo = document.getElementById('tipo').value;

            if(!periodo || !desc || !valor) return alert("Preencha todos os campos!");

            if (!database[periodo]) database[periodo] = [];
            database[periodo].push({desc, valor, tipo});
            
            localStorage.setItem('financasPeriodos', JSON.stringify(database));
            atualizarInterface();
        }

        function remover(index) {
            const periodo = mesInput.value;
            database[periodo].splice(index, 1);
            localStorage.setItem('financasPeriodos', JSON.stringify(database));
            atualizarInterface();
        }

        // Carrega ao abrir
        atualizarInterface();
    </script>
</body>
</html>
