<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Controle de Gastos</h2>
        
        <div class="row">
            <!-- Formulário -->
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <input type="text" id="desc" class="form-control mb-2" placeholder="Descrição">
                    <input type="number" id="valor" class="form-control mb-2" placeholder="Valor (R$)">
                    <select id="tipo" class="form-control mb-2">
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                    <button onclick="adicionar()" class="btn btn-primary w-100">Salvar</button>
                </div>
            </div>

            <!-- Gráfico e Resumo -->
            <div class="col-md-8">
                <div class="card p-3 shadow-sm">
                    <canvas id="meuGrafico"></canvas>
                    <h4 class="mt-3">Saldo Atual: <span id="saldo">R$ 0,00</span></h4>
                </div>
            </div>
        </div>

        <table class="table mt-4 bg-white shadow-sm">
            <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Ação</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('dadosFinanceiros')) || [];
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        let chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Receitas', 'Despesas'], datasets: [{ data: [0, 0], backgroundColor: ['#28a745', '#dc3545'] }] } });

        function atualizar() {
            localStorage.setItem('dadosFinanceiros', JSON.stringify(transacoes));
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            let totalRec = 0, totalDesp = 0;

            transacoes.forEach((t, i) => {
                if(t.tipo === 'receita') totalRec += parseFloat(t.valor);
                else totalDesp += parseFloat(t.valor);
                
                lista.innerHTML += `<tr><td>${t.desc}</td><td>${t.tipo}</td><td>R$ ${t.valor}</td><td><button class="btn btn-danger btn-sm" onclick="remover(${i})">X</button></td></tr>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(totalRec - totalDesp).toFixed(2)}`;
            chart.data.datasets[0].data = [totalRec, totalDesp];
            chart.update();
        }

        function adicionar() {
            const desc = document.getElementById('desc').value;
            const valor = document.getElementById('valor').value;
            const tipo = document.getElementById('tipo').value;
            if(!desc || !valor) return alert("Preencha tudo!");
            transacoes.push({desc, valor, tipo});
            atualizar();
        }

        function remover(i) { transacoes.splice(i, 1); atualizar(); }
        atualizar();
    </script>
</body>
</html>
